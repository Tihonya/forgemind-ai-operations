name: End-to-End Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  e2e-check:
    name: Check if E2E tests exist
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for tests/e2e directory
        id: check
        run: |
          if [ -d "tests/e2e" ] && [ -f "tests/e2e/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ E2E test structure found"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  No E2E test structure found, skipping"
          fi

  e2e:
    name: Run E2E tests
    needs: e2e-check
    if: needs.e2e-check.outputs.should-run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: |
          cp .env.example .env
          sed -i 's/SECRET_KEY=.*/SECRET_KEY=test_secret_key_for_ci_only_32_chars_minimum/' .env

      - name: Start services
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:80/health; do sleep 2; done'
          timeout 60 bash -c 'until curl -f http://localhost:80; do sleep 2; done'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        working-directory: ./tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: ./tests/e2e
        env:
          BASE_URL: http://localhost:80
          API_URL: http://localhost:80/api/v1
        run: npx playwright test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 30

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: tests/e2e/test-results/
          retention-days: 30

      - name: Stop services
        if: always()
        run: docker compose down
